# Fly.io config for the Staxis ML service (demand/supply/inventory prediction).
#
# First deployed 2026-07-05, replacing the Railway home that was deleted in the
# Plan v4 teardown (the old staxis-ml.up.railway.app URLs 404; ML_SERVICE_URLS
# in Vercel had been blanked). Lives next to staxis-cua on the same Fly account.
#
# Workload shape: the service is only called by the Vercel ml-* cron routes
# (daily predict ~06:00 CT, weekly train Sunday, priors Sunday) plus the
# occasional doctor health ping — so machines auto-stop between requests and
# auto-start on demand. Cold start is a few seconds (uvicorn + numpy import),
# which the cron routes' timeouts (maxDuration 300s) absorb easily.
#
# Secrets (flyctl secrets set ... --app staxis-ml):
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY  — PostgREST access (main data path)
#   ML_SERVICE_SECRET                         — bearer the Vercel cron routes send
#                                               (same value as Vercel env ML_SERVICE_SECRET)
#   DATABASE_URL                              — direct Postgres (advisory locks +
#                                               auto-rollback path)
# Rotation playbooks: RUNBOOKS.md.

app = "staxis-ml"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
