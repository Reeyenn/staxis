name: Tests

# Runs on every push to main and every PR. The chain catches regressions
# *before* they reach Vercel. Each step has a comment explaining what it
# protects against — keep them when editing.
#
# Order is intentional: cheap checks first (lint, type-check) so a broken
# import surfaces in <30s, then unit tests, then the more expensive build.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 2026-05-12 (Codex audit): pin permissions to the minimum needed.
# The default GITHUB_TOKEN scope on PR runs depends on org/repo
# settings; if defaults are permissive, an untrusted PR's code (run
# via `npm ci` + `npm run build`) could exfiltrate a token with
# write access. This job only needs to read the checked-out code.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Lint — ESLint flat config (eslint.config.js) bridged to
      # eslint-config-next via FlatCompat. The cosmetic
      # react/no-unescaped-entities rule is disabled project-wide.
      # `--max-warnings 0` means ANY warning fails the build — keeps
      # the codebase from drifting back into the noisy state.
      - name: Lint
        run: npx eslint src/ --max-warnings 0

      # Type-check — fails on any tsc error.
      - name: Type-check
        run: npx tsc --noEmit

      # Scraper unit tests run on plain node:test.
      - name: Run scraper unit tests
        run: node --test scraper/__tests__/*.test.js

      # TypeScript test suites run via tsx --test. supabase-admin.ts throws
      # at module load if Supabase env vars are missing, and several test
      # files transitively import it; pass placeholder env so the imports
      # succeed. Tests don't make real Supabase calls.
      - name: Run TypeScript unit tests
        env:
          NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'placeholder-anon-key'
          SUPABASE_SERVICE_ROLE_KEY: 'placeholder-service-role-key'
        run: npx tsx --test src/lib/__tests__/*.test.ts

      # Final guard: actually build the app. Catches Next.js bundler errors
      # (missing client/server boundaries, dynamic-import paths, etc.) that
      # tsc happily ignores. Without this, a "type-clean" PR can still break
      # production. Skipped if NEXT_TELEMETRY_DISABLED isn't set; we set it
      # to avoid the telemetry prompt blocking CI on a fresh runner.
      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          # Build needs *some* values for any process.env reads at module
          # load time. We give safe placeholders here — the build doesn't
          # actually call Supabase, so wrong values are fine.
          NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'placeholder-anon-key'
          SUPABASE_SERVICE_ROLE_KEY: 'placeholder-service-role-key'
        run: npm run build
