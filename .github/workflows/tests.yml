name: Tests

# Runs on every push to main and every PR. The chain catches regressions
# *before* they reach Vercel. Each step has a comment explaining what it
# protects against — keep them when editing.
#
# Order is intentional: cheap checks first (lint, type-check) so a broken
# import surfaces in <30s, then unit tests, then the more expensive build.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 2026-05-12 (Codex audit): pin permissions to the minimum needed.
# The default GITHUB_TOKEN scope on PR runs depends on org/repo
# settings; if defaults are permissive, an untrusted PR's code (run
# via `npm ci` + `npm run build`) could exfiltrate a token with
# write access. This job only needs to read the checked-out code.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Phase M3.1 (2026-05-14): Python toolchain for ml-service.
      # Adding pytest to CI was the missing root-cause gate that let two
      # NameError/AttributeError cold-start crashes ship in M3 — the test
      # suite existed locally but never ran in CI. Setup is cached on
      # requirements.txt so this only re-installs when deps change.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ml-service/requirements.txt

      - name: Install ml-service deps
        working-directory: ml-service
        run: pip install -r requirements.txt

      # Lint — ESLint flat config (eslint.config.js) bridged to
      # eslint-config-next via FlatCompat. The cosmetic
      # react/no-unescaped-entities rule is disabled project-wide.
      # `--max-warnings 0` means ANY warning fails the build — keeps
      # the codebase from drifting back into the noisy state.
      # Also runs scripts/check-env-access.mjs — fails CI if any file
      # outside the canonical env modules (src/lib/env.ts etc.) reads
      # process.env directly. Forces new code to import { env }.
      - name: Lint
        run: npm run lint

      # Type-check — fails on any tsc error.
      - name: Type-check
        run: npx tsc --noEmit

      # Scraper unit tests run on plain node:test.
      - name: Run scraper unit tests
        run: node --test scraper/__tests__/*.test.js

      # TypeScript test suites run via tsx --test. The env module (src/lib/env.ts)
      # validates required vars at boot and several test files transitively
      # import it; pass placeholder env so the imports succeed. Tests don't
      # make real Supabase calls. Placeholder values are >= 20 chars to satisfy
      # the schema's min length validators.
      - name: Run TypeScript unit tests
        env:
          NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'placeholder-anon-key-min-20-chars'
          SUPABASE_SERVICE_ROLE_KEY: 'placeholder-service-role-key-min-20-chars'
        run: npx tsx --test src/lib/__tests__/*.test.ts

      # Phase M3.1 (2026-05-14): static check for undefined names. F821
      # would have caught the demand.py:214 NameError on `property_meta`
      # at PR-open time without needing any test. Cheap defense in depth.
      # Scope narrowed to src/ — pre-existing type debt elsewhere does
      # not block this gate.
      - name: Static check ml-service (ruff F821 — undefined names)
        working-directory: ml-service
        run: |
          pip install ruff
          ruff check src/ --select F821

      # Phase M3.1: Python tests gate. The actual root-cause fix for the
      # M3 cold-start ship-blockers — they slipped because pytest never
      # ran in CI. Placeholder env vars keep get_settings() from failing
      # at module import inside transitively-imported src/* code. Tests
      # don't make real network/DB calls (mock supabase wrapper).
      - name: Run ml-service tests
        working-directory: ml-service
        env:
          SUPABASE_URL: 'https://placeholder.supabase.co'
          SUPABASE_SERVICE_ROLE_KEY: 'placeholder-service-role-key'
          ML_SERVICE_SECRET: 'placeholder-secret-12345'
        run: python -m pytest -v --tb=short

      # Codex round-5 META J1.4 (2026-05-13): warn on overgrown ML files.
      # The `_train_single_item` function in inventory_rate.py grew from
      # 908 → 979 lines across 5 review rounds, mostly comments
      # explaining what the prior round got wrong. Each new edit lands
      # in a function too big for any reviewer to keep in head. This is
      # a SOFT WARN — doesn't fail the build — to surface the problem
      # before it blocks the next reviewer. Threshold tuned to current
      # state (inventory_rate.py is ~960 lines today; aim to get under
      # 600 by extracting modules, NOT by inflating the threshold).
      - name: Warn on oversized ML files
        run: |
          # Find ML-layer source files over the threshold; emit GH
          # workflow warnings (yellow annotation in the PR view).
          THRESHOLD=600
          OVERSIZED=$(find ml-service/src src/lib/db src/app/api/cron/ml-* \
            \( -name '*.py' -o -name '*.ts' \) -type f 2>/dev/null \
            | xargs -I{} sh -c 'lines=$(wc -l < "$1"); [ "$lines" -gt '"$THRESHOLD"' ] && echo "$lines $1"' _ {} \
            | sort -rn || true)
          if [ -n "$OVERSIZED" ]; then
            echo "$OVERSIZED" | while IFS=' ' read -r lines file; do
              echo "::warning file=${file},line=1::ML file is ${lines} lines (>${THRESHOLD}). Extract a module before adding more logic — see Phase J in the plan history."
            done
          else
            echo "All ML files are under ${THRESHOLD} lines. ✓"
          fi

      # Final guard: actually build the app. Catches Next.js bundler errors
      # (missing client/server boundaries, dynamic-import paths, etc.) that
      # tsc happily ignores. Without this, a "type-clean" PR can still break
      # production. Skipped if NEXT_TELEMETRY_DISABLED isn't set; we set it
      # to avoid the telemetry prompt blocking CI on a fresh runner.
      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          # Build needs *some* values for any process.env reads at module
          # load time. We give safe placeholders here — the build doesn't
          # actually call Supabase, so wrong values are fine.
          NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'placeholder-anon-key-min-20-chars'
          SUPABASE_SERVICE_ROLE_KEY: 'placeholder-service-role-key-min-20-chars'
        run: npm run build
