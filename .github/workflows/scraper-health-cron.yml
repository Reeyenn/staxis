# Scraper Health Check — GitHub Actions cron
#
# Why this lives here instead of vercel.json:
#   Vercel Hobby plan limits cron jobs to "once per day" max. The scraper
#   can go silent for hours between health checks on that cadence, which
#   defeats the entire point of the alerting system (catch staleness BEFORE
#   Maria makes a bad decision). GitHub Actions has no such limit.
#
# What it does:
#   Every 15 minutes, curls the production endpoint /api/cron/scraper-health.
#   That endpoint reads the scraper_status Postgres table (Supabase), detects
#   staleness or explicit error codes, and fires an SMS to OPS_ALERT_PHONE
#   with a specific, actionable message.
#
# Required GitHub Secrets:
#   CRON_SECRET — same value as the CRON_SECRET env var in Vercel. Used as
#                 Bearer auth so only we can trigger this endpoint.
#
# If CRON_SECRET is not configured, the endpoint still works (it treats
# missing secret as "open" for manual testing) but the workflow will send
# a blank Authorization header that Vercel will accept. Set the secret
# for production safety.

name: Scraper Health Check

on:
  schedule:
    # Every 15 minutes. Tight enough that a dead scraper is caught within
    # one business-hour decision window; loose enough to be well under any
    # GitHub Actions rate limit.
    - cron: "*/15 * * * *"
  # Allow manual triggering from the Actions tab for testing.
  workflow_dispatch:

# Minimal permissions — this workflow only calls a public URL.
permissions:
  contents: read

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping scraper-health endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          URL="https://hotelops-ai.vercel.app/api/cron/scraper-health"

          # Use -f so HTTP 4xx/5xx exits non-zero and fails the workflow.
          # -sS keeps output quiet on success but shows errors. -m 60 caps
          # the whole call at 60s (the route itself has maxDuration=30).
          # --retry 2 with backoff covers a cold-start blip.
          RESPONSE=$(curl \
            --fail-with-body \
            --silent \
            --show-error \
            --max-time 60 \
            --retry 2 \
            --retry-delay 5 \
            --retry-connrefused \
            -H "Authorization: Bearer ${CRON_SECRET:-}" \
            "$URL")

          echo "Response: $RESPONSE"

          # The endpoint returns JSON with ok:true when it ran (whether or
          # not it alerted). If ok is false, something inside the handler
          # threw — fail the workflow so GitHub emails us.
          echo "$RESPONSE" | grep -q '"ok":true' || {
            echo "::error::scraper-health endpoint returned ok:false or malformed JSON"
            exit 1
          }
