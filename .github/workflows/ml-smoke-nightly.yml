# Nightly ML smoke test — Phase 4 (2026-05-13)
#
# Why this exists:
#   Doctor catches env/auth/freshness regressions. Unit tests catch
#   per-module logic regressions. Neither catches "the chain still
#   types but the cockpit response shape silently dropped a Phase 1
#   field." This smoke runs scripts/ml-smoke-test.ts against the live
#   prod API once a night and shape-checks the contracts we locked in.
#
# Required GitHub Secrets:
#   CRON_SECRET             — Bearer for /api/admin/doctor
#   SMOKE_PROPERTY_ID       — UUID of a designated read-only property
#   SUPABASE_URL            — for the property_misconfigured events read
#   SUPABASE_SERVICE_ROLE   — service role key

name: ML smoke (nightly)

on:
  schedule:
    # 02:00 UTC daily (~9pm Central). After all daily ML crons have run.
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write   # so we can open an issue on failure

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 22+ ships native WebSocket; older @supabase/supabase-js
          # versions imported a polyfill but newer ones throw at import
          # time on Node 20. The smoke crashed with
          # "Node.js 20 detected without native WebSocket support."
          # until this bumped to 22.
          node-version: '22'
          cache: 'npm'
      - name: Install minimal deps for the smoke script
        run: |
          # tsx runs .ts directly without a build step; @supabase/supabase-js
          # is the only runtime dep the smoke script needs that isn't stdlib.
          npm install --no-save tsx @supabase/supabase-js
      - name: Run smoke
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SMOKE_PROPERTY_ID: ${{ secrets.SMOKE_PROPERTY_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          SMOKE_BASE_URL: https://getstaxis.com
        run: npx tsx scripts/ml-smoke-test.ts
      # Phase J META gap-2 (2026-05-13): the prior version opened a NEW
      # issue every nightly failure. Five debug-session failures earlier
      # today produced 5 open issues — alarm fatigue. Now: find the
      # single existing open issue (label smoke-failure) and update it
      # with a comment + retitle to the latest date. If none exists,
      # open one. Auto-closes when smoke passes again.
      - name: Update or open consolidated failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commentBody =
              `❌ ML smoke failed again on ${today}.\n\n` +
              `Run: ${runUrl}\n\n` +
              `Likely a Phase 1+2+3 invariant regression (response-shape, doctor check, or property_misconfigured event flow). ` +
              `Check the run logs for the failing assertion.`;

            // Find the existing open smoke-failure issue (if any).
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'smoke-failure',
              state: 'open',
              per_page: 5,
            });

            if (openIssues.length > 0) {
              // Update the most recent — comment + retitle so the
              // last-failure date is always visible in the issue list.
              const issue = openIssues[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                title: `ML smoke failing (latest: ${today})`,
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: commentBody,
              });
              core.notice(`Updated existing smoke-failure issue #${issue.number}`);
            } else {
              // No open issue — create one.
              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `ML smoke failing (latest: ${today})`,
                body: commentBody,
                labels: ['ml', 'smoke-failure'],
              });
              core.notice(`Opened new smoke-failure issue #${newIssue.number}`);
            }
      # Auto-close any open smoke-failure issues when the smoke passes.
      # Reeyen sees green = silence with no leftover noise in the issue
      # list. Without this, you'd have to manually close failures after
      # the underlying bug is fixed.
      - name: Auto-close smoke-failure issues on green
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'smoke-failure',
              state: 'open',
              per_page: 10,
            });
            for (const issue of openIssues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✓ ML smoke passed on ${today}. Auto-closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
              core.notice(`Auto-closed smoke-failure issue #${issue.number}`);
            }
