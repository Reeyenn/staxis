name: ML cron

# Triggers the ML training + inference endpoints on a schedule.
#
# Cadence chosen to match the existing scraper-health-cron.yml pattern.
# Vercel Hobby caps native crons at once-per-day; GitHub Actions doesn't,
# and we already use it for scraper-health, post-deploy-smoke-test, and
# daily-drift-check. Same secrets, same auth pattern.
#
# Why these specific times:
#   • Sunday 03:00 CT (08:00 UTC)  — train demand model weekly
#   • Sunday 03:30 CT (08:30 UTC)  — train supply model weekly (+30min so
#                                     the small Railway service isn't
#                                     juggling two heavy training jobs)
#   • Daily 05:30 CT (10:30 UTC)   — inference for tomorrow. After the
#                                     5am scraper window opens but before
#                                     Maria's morning planning.
#
# Auth: Bearer ${{ secrets.CRON_SECRET }} — same secret value as Vercel +
# Railway (cross-platform fingerprint check enforces parity via the
# scraper's heartbeat row).

on:
  # INVENTORY ML re-enabled 2026-07-05 — the inventory-rate pipeline now has
  # a live data source again: the seal-daily cron projects tomorrow's
  # occupancy into plan_snapshots from the pms_* tables (migration 0292),
  # so inventory training + prediction produce real output instead of the
  # dead-endpoint failures that got the whole block disabled on 2026-05-30.
  #
  # Enabled here: aggregate-priors (Sun 03:00 CT) → train-inventory
  # (Sun 04:00 CT, +1h so priors land first) → predict-inventory (daily
  # 06:00 CT). Priors runs before training so the cold-start cohort priors
  # are fresh when the weekly fit reads them.
  #
  # STILL DISABLED (housekeeping ML — demand/supply/run-inference and the
  # auto-rollback pipeline): those consume attendance-labelled training data
  # that is a separate re-enablement decision; left commented on purpose.
  # Their jobs + all ML code are KEPT; re-enable by uncommenting the matching
  # cron line. Manual runs of ANY job still work via the Actions tab
  # (workflow_dispatch).
  schedule:
  # cron is UTC. CDT is UTC-5; CST is UTC-6.
  # NOTE: each cron string here also matches a job's `if:` guard below by
  # exact string. aggregate-priors uses its OWN distinct time ('30 7 * * 0')
  # so it does NOT collide with train-demand's '0 8 * * 0' guard — that would
  # re-run the disabled housekeeping demand job. Keep priors on a unique slot.
  # - cron: '0 8 * * 0'    # Sunday 03:00 CDT — train/demand (housekeeping ML — disabled)
  # - cron: '30 8 * * 0'   # Sunday 03:30 CDT — train/supply (housekeeping ML — disabled)
  - cron: '30 7 * * 0'     # Sunday 02:30 CDT — aggregate cohort priors (before inventory training)
  - cron: '0 9 * * 0'      # Sunday 04:00 CDT — train/inventory-rate
  # - cron: '30 10 * * *'  # Daily 05:30 CDT — run inference (housekeeping ML — disabled)
  - cron: '0 11 * * *'     # Daily 06:00 CDT — predict/inventory-rate
  # - cron: '45 11 * * *'  # Daily 06:45 CDT — auto-rollback pipeline (housekeeping ML — disabled)
  workflow_dispatch: {}    # manual trigger from the Actions UI

jobs:
  train-demand:
    if: github.event.schedule == '0 8 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Hard cap so a hung TLS handshake / DNS pathology can't block this
    # workflow queue for 6h (GH default). Routes have maxDuration=300s
    # at fleet scale (50+ hotels). 7-min job timeout = 1× full route +
    # one short retry window for transient cold-start blips.
    timeout-minutes: 7
    steps:
      - name: Hit /api/cron/ml-train-demand
        run: |
          # --max-time 310 covers each route's own maxDuration (≤300s)
          # with a small buffer. --retry 1 absorbs cold-start blips; we
          # dropped from --retry 2 because a second retry at 310s would
          # exceed the job's 7-min budget.
          curl -fsS --max-time 310 --retry 1 --retry-delay 5 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://getstaxis.com/api/cron/ml-train-demand" | tee /tmp/result.json
          # Fail the job if the response indicates a problem
          # Outer .ok must be true AND no per-property result may have
          # status="error". Other statuses (ok / insufficient_data /
          # unknown / skipped_ai_off) are legitimate ML pipeline states
          # — only "error" means the route caught an exception and
          # couldn't make a verdict at all. May 2026 audit's earlier
          # version was stricter (also failed on "unknown"), but
          # "unknown" turned out to be the legitimate fallback shape
          # for any non-error ML service return that lacked an explicit
          # status field. The doctor's ml_*_predictions_fresh checks
          # are the authoritative signal for "models exist but no
          # predictions landed" — that's where the silent-fail bug
          # class is now caught.
          #
          # Also fail on top-level `.skipped`: that response shape means
          # the route hit its early-exit (no ML config) and wrote nothing.
          # In prod that's the silent-cron-success bug from May 2026 that
          # ate 3 days of demand predictions before a doctor check tripped.
          # Routes now return 503 on actual config drift; the only path
          # that still returns `{ok:true, skipped:...}` is "both env vars
          # intentionally unset" — which should never be true for
          # getstaxis.com hits.
          jq -e '
            (.ok == true) and
            ((.skipped // null) == null) and
            (
              (.results // []) | map(
                (.status // "ok") as $s | $s != "error"
              ) | all
            ) and
            (
              (.results // []) | map(
                ((.demand // {}).status // "ok") != "error" and
                ((.supply // {}).status // "ok") != "error" and
                ((.optimizer // {}).status // "ok") != "error"
              ) | all
            )
          ' /tmp/result.json

  train-supply:
