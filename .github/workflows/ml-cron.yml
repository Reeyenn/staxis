    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Hit /api/cron/ml-auto-rollback
        run: |
          # --max-time 310 covers the route's maxDuration=300 with a
          # small buffer. --retry 1 absorbs cold-start blips.
          curl -fsS --max-time 310 --retry 1 --retry-delay 5 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://getstaxis.com/api/cron/ml-auto-rollback" | tee /tmp/result.json
          # Different shape than train/inference routes — no per-property
          # `results[].status` field; the orchestrator's per-pair status
          # lives in execute_failures (empty under normal operation).
          # The route returns ok:true with dry_run + rollbacks_fired
          # counts in the body — dry_run mode is the expected state for
          # the first 30 days. A non-empty execute_failures array means
          # a property had a rollback decision but the deactivate write
          # failed (DB lock, RPC error). Fail in that case because the
          # rolling-MAE evidence is now inconsistent with model_runs.
          jq -e '
            (.ok == true) and
            ((.skipped // null) == null) and
            ((.execute_failures // []) | length == 0)
          ' /tmp/result.json
