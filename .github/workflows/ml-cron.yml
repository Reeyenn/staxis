  auto-rollback:
    # Phase 7 v2 (2026-05-22). Daily 06:45 CDT — runs the auto-rollback
    # pipeline (backfill prediction_log → per-(property, layer) Wilcoxon →
    # cooldown filter → BH-FDR → execute or dry-run-log). See
    # /api/cron/ml-auto-rollback route header for the full design.
