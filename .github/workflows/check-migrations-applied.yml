name: Check migrations applied

# Required PR gate: every supabase/migrations/*.sql file must already be
# applied to the production database before the PR can merge. Vercel doesn't
# auto-apply migrations, so without this gate it's possible to ship code
# that expects a column/table/function that doesn't exist in prod yet —
# exactly what happened with 0124 + 0125 yesterday.
#
# How to make this required: GitHub → Settings → Branches → main →
# "Require status checks to pass before merging" → add "check-migrations".
#
# Local fix when this fails: see the workflow output. It names the missing
# files and the exact command to apply each one via scripts/apply-migration.ts.

on:
  # Round 18 (2026-05-15, Codex high finding): runs on EVERY PR to main,
  # not just PRs that touch supabase/migrations/**. The path-filtered
  # version missed the most dangerous case — a code-only PR that consumes
  # a column whose migration was added in a prior PR and never applied to
  # prod. Cost of running on every PR: one psql round-trip per PR (~200ms).
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check-migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Round 18 #15: pull SUPABASE_DB_* secrets from the 'production'
    # environment instead of repo-level. Limits the blast radius if a
    # future workflow gets compromised — only jobs that explicitly
    # opt-in to this environment can read the prod DB credentials.
    environment: production
    steps:
      # Never execute the pull request's scripts, package lifecycle hooks, or
      # workflow changes with production credentials. The checker and its npm
      # dependency graph come from the trusted base commit; the candidate tree
      # is treated only as migration filenames/content to inventory.
      - name: Check out trusted checker
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.sha }}
          path: trusted
          persist-credentials: false

      - name: Check out candidate tree as data only
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          path: candidate
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: trusted/package-lock.json

      - name: Install trusted checker dependencies
        working-directory: trusted
        run: npm ci --ignore-scripts

      - name: Verify every migration file is registered in prod
        working-directory: trusted
        env:
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        # The supplied database credential should be a dedicated role with
        # CONNECT plus SELECT on applied_migrations only. The job never needs
        # schema mutation privileges.
        run: npx tsx scripts/check-migrations-applied.ts --migrations-dir=../candidate/supabase/migrations
