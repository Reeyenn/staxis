name: Deploy Firestore Rules

# Auto-deploy Firestore rules whenever firestore.rules or firestore.indexes.json
# changes on main. This removes the "manual Firebase Console paste" step that
# failed silently during the March rollout — now `git push` is the only action
# needed to ship a rules change.
#
# Required GitHub secret:
#   FIREBASE_SERVICE_ACCOUNT  — JSON key for a service account with the
#                               "Firebase Rules Admin" role on hotelops-ai.
#   (Generate in Firebase Console → Project Settings → Service Accounts →
#   Generate New Private Key, then paste the full JSON into the repo's
#   Settings → Secrets and variables → Actions → New repository secret.)

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-firestore-rules.yml'
  workflow_dispatch:  # allow manual runs from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node (for firebase-tools)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-tools
        run: npm install -g firebase-tools@13

      - name: Write service account credentials
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$SA_JSON" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is not set"
            exit 1
          fi
          printf '%s' "$SA_JSON" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> $GITHUB_ENV

      - name: Deploy Firestore rules + indexes
        run: |
          firebase deploy \
            --only firestore:rules,firestore:indexes \
            --project hotelops-ai \
            --non-interactive

      - name: Cleanup credentials
        if: always()
        run: rm -f "$RUNNER_TEMP/sa.json"
