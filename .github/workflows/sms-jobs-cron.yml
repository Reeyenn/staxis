# SMS Jobs Worker — GitHub Actions cron
#
# Why this lives here instead of vercel.json:
#   Vercel Hobby plan limits cron jobs to "once per day" max. The SMS jobs
#   queue needs to drain at least every minute or so for shift confirmations
#   to feel "instant" to Mario; that's well below Vercel's free-tier limit.
#   GitHub Actions has a 5-minute floor on schedule, which is acceptable
#   for the queue's latency target (most batches send in well under 5 min
#   end-to-end).
#
# What it does:
#   Every 5 minutes, curls /api/cron/process-sms-jobs. That endpoint
#   resets stuck rows (worker died mid-call), then claims and sends up to
#   50 queued SMS jobs via Twilio.
#
# Required GitHub Secrets:
#   CRON_SECRET — same value as the CRON_SECRET env var in Vercel. Used as
#                 Bearer auth so only we can trigger this endpoint.
#
# Migration path:
#   When we go Pro on Vercel, swap this for a vercel.json crons entry at
#   `* * * * *` (every-1-min). Until then this 5-minute cadence is what
#   we have. The queue tolerates higher latency gracefully — the worst
#   case is a confirmation lands a few minutes late, not lost.

name: SMS Jobs Worker

on:
  schedule:
    # Every 5 minutes. GitHub's hard floor is 5 min on cron schedules.
    - cron: "*/5 * * * *"
  # Allow manual triggering from the Actions tab for testing / draining
  # a backlog after maintenance.
  workflow_dispatch:

# Minimal permissions — this workflow only calls a public URL.
permissions:
  contents: read

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Drain SMS jobs queue
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          URL="https://getstaxis.com/api/cron/process-sms-jobs"

          # Use --fail-with-body so HTTP 4xx/5xx exits non-zero and fails
          # the workflow (so GitHub emails us). -sS hides progress but
          # surfaces errors. -m 60 caps the call at 60s (route's own
          # maxDuration is 30s). --retry 2 absorbs a cold-start blip.
          RESPONSE=$(curl \
            --fail-with-body \
            --silent \
            --show-error \
            --max-time 60 \
            --retry 2 \
            --retry-delay 5 \
            --retry-connrefused \
            -H "Authorization: Bearer ${CRON_SECRET:-}" \
            "$URL")

          echo "Response: $RESPONSE"

          # Endpoint returns JSON with ok:true on a clean tick. If ok is
          # false, the handler threw — fail the workflow so we hear about
          # it.
          echo "$RESPONSE" | grep -q '"ok":true' || {
            echo "::error::process-sms-jobs returned ok:false or malformed JSON"
            exit 1
          }
