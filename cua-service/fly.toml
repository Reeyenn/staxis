# ─────────────────────────────────────────────────────────────────────────
# Fly.io app: staxis-cua
#
# Worker pattern, not HTTP service. The CUA service polls Supabase for
# queued onboarding_jobs and processes them. No public ingress required.
#
# Region: iad (Ashburn). Anthropic API + Supabase Postgres are both
# US-East-friendly. Move closer if we add more regions later.
#
# Sizing: shared-cpu-1x (1 vCPU, 1GB RAM) is enough for one concurrent
# Playwright session per machine. We scale by adding machines, not by
# upsizing — agents are pleasingly parallel.
#
# Secrets needed (set via `fly secrets set`):
#   ANTHROPIC_API_KEY            — from console.anthropic.com
#   NEXT_PUBLIC_SUPABASE_URL     — same as the Vercel app
#   SUPABASE_SERVICE_ROLE_KEY    — same as the Vercel app
#   CRON_SECRET                  — shared with Vercel/GitHub Actions
# ─────────────────────────────────────────────────────────────────────────

app = "staxis-cua"
primary_region = "iad"

# Grace period for in-flight onboarding jobs to finish on deploy/SIGTERM.
# Default Fly kill_timeout is 5 SECONDS, which would SIGKILL a worker
# before its 4-min job timeout fires. Index.ts SIGTERM handler waits up
# to 5 minutes for an in-flight job to finish; this setting lets Fly
# honor that window. (Pass-3 fix — H9.)
kill_signal = "SIGTERM"
kill_timeout = "300s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  POLL_INTERVAL_MS = "5000"
  WORKER_ID_PREFIX = "fly-cua"
  # Hard cap per mapping run. Login + 4 action phases (housekeeping,
  # arrivals, departures, staff) at ~2-3 min each = up to 15 min worst
  # case. Code default (job-runner.ts) is also 900000; this just makes
  # the env explicit.
  JOB_TIMEOUT_MS = "900000"

# No [[services]] block — this is a worker, not an HTTP service. Fly
# still keeps it alive via the `auto_stop_machines = false` flag below.

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  cpus = 1

[deploy]
  # Rolling restart: at least one machine is always running so jobs
  # don't pile up while we deploy.
  strategy = "rolling"

# Worker pattern — must stay running. After deploys (which send SIGTERM
# and exit cleanly with code 0), Fly's "on-failure" policy would NOT
# restart, leaving the machine stopped indefinitely. "always" restarts
# on any exit, including clean ones — which is what we want for a poller.
# (Fix found 2026-05-09 — first browser-tool deploy left the primary
# machine stopped for ~6 minutes until a manual flyctl machine start.)
[[restart]]
  policy = "always"
  max_retries = 5
